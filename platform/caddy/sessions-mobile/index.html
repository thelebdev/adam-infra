<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>sessions (mobile)</title>
<style>
  :root { --bar-h: 46px; }
  html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #eee; overflow: hidden; overscroll-behavior: none; }
  #frame { display: block; border: 0; width: 100vw; height: calc(100vh - var(--bar-h) - env(safe-area-inset-bottom, 0px)); background: #000; }
  #bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    height: calc(var(--bar-h) + env(safe-area-inset-bottom, 0px));
    padding-bottom: env(safe-area-inset-bottom, 0px);
    display: flex; align-items: stretch; overflow-x: auto;
    background: #141414; color: #ddd;
    border-top: 1px solid #2a2a2a;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
    font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    user-select: none; -webkit-user-select: none; touch-action: pan-x;
  }
  #bar::-webkit-scrollbar { display: none; }
  #bar button {
    flex: 0 0 auto; min-width: 44px; padding: 0 12px;
    border: 0; border-right: 1px solid #262626;
    background: transparent; color: inherit; font: inherit;
    touch-action: manipulation; cursor: pointer;
  }
  #bar button:active, #bar button.on { background: #2a2a2a; color: #fff; }
  #bar button.sticky.on { background: #3a3a3a; color: #ffd479; }

  /* --- file upload ----------------------------------------------------
     The drop overlay covers the iframe area only when a drag enters the
     window or an upload is in flight. The result toast slides up from
     the bottom (above the toolbar), shows the absolute path of the
     uploaded file, and offers Copy and Send-to-terminal. */
  #drop {
    position: fixed; left: 0; right: 0; top: 0;
    bottom: calc(var(--bar-h) + env(safe-area-inset-bottom, 0px));
    background: rgba(20, 40, 70, .88); color: #cfe; z-index: 10;
    display: none; align-items: center; justify-content: center;
    font: 16px ui-monospace, monospace; text-align: center; padding: 0 24px;
    pointer-events: none;
  }
  #drop.on { display: flex; }
  #toast {
    position: fixed; left: 8px; right: 8px;
    bottom: calc(var(--bar-h) + env(safe-area-inset-bottom, 0px) + 8px);
    background: #1c1f26; border: 1px solid #3a4252; border-radius: 8px;
    padding: 10px 12px; color: #e6e6e6; z-index: 11;
    font: 13px ui-monospace, monospace; box-shadow: 0 6px 24px rgba(0,0,0,.5);
    display: none;
  }
  #toast.on { display: block; }
  #toast .path { word-break: break-all; color: #cdd5e0; margin-bottom: 8px; }
  #toast .row { display: flex; gap: 6px; flex-wrap: wrap; }
  #toast button {
    flex: 1 1 auto; min-width: 90px; padding: 8px 10px;
    background: #2a3140; color: #fff; border: 1px solid #3a4252;
    border-radius: 6px; font: inherit; cursor: pointer; touch-action: manipulation;
  }
  #toast button.primary { background: #3a5d8f; border-color: #4d75b3; }
  #toast button:active { filter: brightness(1.2); }
  #toast .err { color: #ff9b9b; }
</style>
</head>
<body>
<iframe id="frame" title="terminal" allow="clipboard-read; clipboard-write"></iframe>
<div id="bar" role="toolbar" aria-label="terminal keys">
  <!-- Upload triggers the hidden file picker. On mobile the picker shows
       Photos / Files; on desktop it opens the OS file dialog. Drag-and-drop
       and image paste also funnel into the same uploadFile() path below. -->
  <button id="uploadBtn" title="upload a file to your workspace">+</button>
  <input id="filePick" type="file" style="display:none" multiple>
  <button data-seq="\x1b">Esc</button>
  <button data-seq="\t">Tab</button>
  <button class="sticky" data-mod="ctrl">Ctrl</button>
  <!-- Sel sends tmux `prefix C-s`, which the session tmux.conf binds to
       toggle mouse mode. Mouse on = tmux owns drag/scroll (great for
       scrollback). Mouse off = browser-native text selection (long-press
       to select → tap Copy on mobile, or Cmd/Ctrl-C on desktop). The
       tmux status bar reports the new state on each toggle. -->
  <button data-seq="\x02\x13" title="toggle mouse mode for text selection">Sel</button>
  <button data-seq="\x1b[A" aria-label="up">&uarr;</button>
  <button data-seq="\x1b[B" aria-label="down">&darr;</button>
  <button data-seq="\x1b[D" aria-label="left">&larr;</button>
  <button data-seq="\x1b[C" aria-label="right">&rarr;</button>
  <button data-seq="\x03">^C</button>
  <button data-seq="\x04">^D</button>
  <button data-seq="\x12">^R</button>
  <button data-seq="\x15">^U</button>
  <button data-seq="\x17">^W</button>
  <button data-seq="\x1a">^Z</button>
  <button data-seq="\x0c">^L</button>
  <button data-seq="\x01">Home</button>
  <button data-seq="\x05">End</button>
  <button data-seq="|">|</button>
  <button data-seq="~">~</button>
  <button data-seq="/">/</button>
  <button data-seq="-">-</button>
  <button data-seq="_">_</button>
  <button data-seq="$">$</button>
  <button data-seq="*">*</button>
  <button data-seq="&">&amp;</button>
  <button data-seq="#">#</button>
  <button data-seq="\x1b[5~">PgUp</button>
  <button data-seq="\x1b[6~">PgDn</button>
</div>
<div id="drop">Drop file to upload to your workspace</div>
<div id="toast" role="status" aria-live="polite"></div>
<script>
(function () {
  var frame = document.getElementById('frame');
  var bar = document.getElementById('bar');

  // Carry the original query (?arg=<session>) into the iframe so existing
  // bookmarks like /m/?arg=foo land on the right tmux session.
  frame.src = '/_term/' + (location.search || '');

  // Decode the \xNN escapes the buttons declare — the HTML attribute value
  // is a literal "\x1b" string, not the byte. data-mod is handled separately.
  function decodeSeq(s) {
    return s.replace(/\\x([0-9a-fA-F]{2})/g, function (_, h) {
      return String.fromCharCode(parseInt(h, 16));
    }).replace(/\\t/g, '\t').replace(/\\r/g, '\r').replace(/\\n/g, '\n');
  }

  // Find xterm.js's hidden helper textarea inside the iframe and make it
  // behave like a CLI input on mobile: no first-letter capital, no autocorrect,
  // no autocomplete, no spellcheck. xterm.js mounts asynchronously, so retry.
  function findTextarea() {
    try {
      var doc = frame.contentDocument;
      return doc && doc.querySelector('textarea.xterm-helper-textarea');
    } catch (e) { return null; }
  }

  function applyInputFix(ta) {
    ta.setAttribute('autocapitalize', 'none');
    ta.setAttribute('autocorrect', 'off');
    ta.setAttribute('autocomplete', 'off');
    ta.setAttribute('spellcheck', 'false');
    ta.setAttribute('inputmode', 'text');
    ta.setAttribute('enterkeyhint', 'send');
  }

  frame.addEventListener('load', function () {
    var tries = 0;
    var iv = setInterval(function () {
      var ta = findTextarea();
      if (ta) { applyInputFix(ta); clearInterval(iv); return; }
      if (++tries > 50) clearInterval(iv);
    }, 100);
  });

  // Send raw bytes the way xterm.js receives keystrokes from the OS keyboard:
  // write into the helper textarea and fire an `input` event. xterm.js reads
  // the textarea value, sends it down its WebSocket, and clears the field.
  // This bypasses the keydown->sequence translation, which is fine because
  // the buttons already declare the exact byte sequence to emit (incl. arrow
  // keys in cursor-mode; apps in application-cursor mode are rare on mobile).
  function sendBytes(s) {
    var ta = findTextarea();
    if (!ta) return;
    ta.focus();
    var win = frame.contentWindow;
    var proto = win.HTMLTextAreaElement && win.HTMLTextAreaElement.prototype;
    var setter = proto && Object.getOwnPropertyDescriptor(proto, 'value').set;
    if (setter) setter.call(ta, s); else ta.value = s;
    ta.dispatchEvent(new win.Event('input', { bubbles: true }));
  }

  // Ctrl is a sticky modifier: tap Ctrl, then tap a letter button, and the
  // letter is converted to its control byte (Ctrl-A=0x01 ... Ctrl-Z=0x1a)
  // before being sent. Sticky state clears after one use.
  var ctrlBtn = bar.querySelector('button.sticky[data-mod="ctrl"]');
  var ctrlArmed = false;
  function setCtrl(on) {
    ctrlArmed = on;
    if (ctrlBtn) ctrlBtn.classList.toggle('on', on);
  }

  function ctrlByteFor(s) {
    if (s.length !== 1) return null;
    var c = s.charCodeAt(0);
    if (c >= 97 && c <= 122) return String.fromCharCode(c - 96); // a-z -> 1-26
    if (c >= 65 && c <= 90)  return String.fromCharCode(c - 64); // A-Z -> 1-26
    return null;
  }

  bar.addEventListener('click', function (e) {
    var b = e.target.closest('button');
    if (!b) return;
    e.preventDefault();

    if (b.dataset.mod === 'ctrl') { setCtrl(!ctrlArmed); return; }

    var seq = b.dataset.seq;
    if (seq == null) return;
    seq = decodeSeq(seq);

    if (ctrlArmed) {
      var cb = ctrlByteFor(seq);
      if (cb) seq = cb;
      setCtrl(false);
    }
    sendBytes(seq);
  }, { passive: false });

  // Stop the toolbar from stealing focus from the textarea — keep the OS
  // keyboard up between presses.
  bar.addEventListener('mousedown', function (e) { e.preventDefault(); });
  bar.addEventListener('touchstart', function (e) {
    if (e.target.closest('button')) e.preventDefault();
  }, { passive: false });

  // --- file upload --------------------------------------------------------
  // Three entry points feed the same uploadFile():
  //   1. The "+" button → hidden <input type=file> → user picks
  //   2. Drag-and-drop onto the page (desktop)
  //   3. Paste of an image from the system clipboard (any platform)
  // On success we render a toast with the absolute path the operator can
  // pass to Claude Code via `@path` — with Copy and Send-to-terminal
  // shortcuts so they don't have to retype it.
  var drop = document.getElementById('drop');
  var toast = document.getElementById('toast');
  var filePick = document.getElementById('filePick');
  var uploadBtn = document.getElementById('uploadBtn');

  function showToast(html, isError) {
    toast.innerHTML = html;
    toast.classList.add('on');
    if (isError) {
      // Auto-dismiss errors after a few seconds; success stays until
      // dismissed since the user needs the path.
      setTimeout(function () { toast.classList.remove('on'); }, 5000);
    }
  }

  function dismissToast() { toast.classList.remove('on'); }

  function renderSuccess(desc) {
    var path = desc.path;
    var kb = (desc.size / 1024).toFixed(1);
    toast.innerHTML = '';
    var row1 = document.createElement('div');
    row1.className = 'path';
    row1.textContent = path + '   (' + kb + ' KB)';
    var row2 = document.createElement('div');
    row2.className = 'row';

    var copy = document.createElement('button');
    copy.className = 'primary';
    copy.textContent = 'Copy path';
    copy.onclick = function () {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(path).then(function () {
          copy.textContent = 'Copied';
          setTimeout(function () { copy.textContent = 'Copy path'; }, 1200);
        }).catch(function () {
          fallbackCopy(path); copy.textContent = 'Copied';
        });
      } else { fallbackCopy(path); copy.textContent = 'Copied'; }
    };

    var send = document.createElement('button');
    send.textContent = 'Send to terminal';
    send.title = 'Type @' + path + ' into the active session — Claude Code reads it as an attached file';
    send.onclick = function () {
      // Insert `@<path> ` (with trailing space) into the running TUI.
      // Claude Code's prompt recognises @<path> as an attachment; for a
      // plain shell it's just typed text the operator can edit or delete.
      sendBytes('@' + path + ' ');
      dismissToast();
    };

    var close = document.createElement('button');
    close.textContent = 'Dismiss';
    close.onclick = dismissToast;

    row2.appendChild(copy);
    row2.appendChild(send);
    row2.appendChild(close);
    toast.appendChild(row1);
    toast.appendChild(row2);
    toast.classList.add('on');
  }

  function fallbackCopy(s) {
    var ta = document.createElement('textarea');
    ta.value = s; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) { /* ignore */ }
    document.body.removeChild(ta);
  }

  function uploadFile(file) {
    if (!file) return;
    showToast('Uploading ' + (file.name || 'file') + '…', false);
    var fd = new FormData();
    fd.append('file', file, file.name || 'upload');
    fetch('/api/upload', { method: 'POST', body: fd, credentials: 'same-origin' })
      .then(function (r) {
        if (!r.ok) {
          return r.json().catch(function () { return { error: 'HTTP ' + r.status }; })
            .then(function (j) { throw new Error(j.error || ('HTTP ' + r.status)); });
        }
        return r.json();
      })
      .then(function (desc) { renderSuccess(desc); })
      .catch(function (err) {
        showToast('<span class="err">upload failed:</span> ' + String(err.message || err), true);
      });
  }

  function uploadFiles(files) {
    if (!files || !files.length) return;
    // Single-file UX for now: only the first file in a multi-drop gets
    // surfaced in the toast. The endpoint also only reads the first part.
    uploadFile(files[0]);
  }

  uploadBtn.addEventListener('click', function (e) {
    e.preventDefault();
    filePick.click();
  });
  filePick.addEventListener('change', function () {
    uploadFiles(filePick.files);
    filePick.value = '';  // allow re-picking the same file
  });

  // Drag-and-drop. The iframe (ttyd) covers nearly the whole viewport, and
  // drag events from outside the browser fire on whichever document the
  // cursor is over — they don't cross the iframe boundary, so listening on
  // the parent window alone misses every drop that lands on ttyd. The
  // iframe is same-origin (we already reach into it for the xterm textarea),
  // so attach the same handlers to its document too once it loads.
  var dragDepth = 0;
  function attachDnd(target) {
    target.addEventListener('dragenter', function (e) {
      if (!e.dataTransfer || !Array.from(e.dataTransfer.types || []).includes('Files')) return;
      dragDepth++;
      drop.classList.add('on');
      e.preventDefault();
    }, true);
    target.addEventListener('dragleave', function () {
      dragDepth = Math.max(0, dragDepth - 1);
      if (dragDepth === 0) drop.classList.remove('on');
    }, true);
    target.addEventListener('dragover', function (e) {
      if (e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files')) e.preventDefault();
    }, true);
    target.addEventListener('drop', function (e) {
      if (!e.dataTransfer || !e.dataTransfer.files || !e.dataTransfer.files.length) return;
      e.preventDefault();
      dragDepth = 0;
      drop.classList.remove('on');
      uploadFiles(e.dataTransfer.files);
    }, true);
  }
  attachDnd(window);
  frame.addEventListener('load', function () {
    try {
      var doc = frame.contentDocument;
      if (doc) attachDnd(doc);
    } catch (e) { /* not ready or cross-origin — iframe drops will be missed */ }
  });

  // Clipboard paste — images copied from the OS / another app land here.
  // On iOS this fires when the user long-presses → Paste from the system
  // share sheet over our page (not the iframe).
  window.addEventListener('paste', function (e) {
    if (!e.clipboardData) return;
    var items = e.clipboardData.items || [];
    for (var i = 0; i < items.length; i++) {
      if (items[i].kind === 'file') {
        var f = items[i].getAsFile();
        if (f) { uploadFile(f); e.preventDefault(); return; }
      }
    }
  });
})();
</script>
</body>
</html>
